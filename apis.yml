name: Custom Ink
kind: company
description: >-
  Custom Ink is a direct-to-consumer custom apparel and promotional products
  company that lets groups design and order custom t-shirts, hoodies, hats,
  drinkware, bags, and other branded merchandise through an online Design Lab,
  instant price quotes, and full-service order fulfillment. As of the review
  date Custom Ink does not publish a public or partner developer API - there is
  no documented, self-serve programmatic surface for products, designs, quotes,
  or orders. An internal API host (api.customink.com) backs Custom Ink's own web
  and mobile storefront but is private and undocumented, secured behind AWS API
  Gateway and Cognito. Partnerships are handled as commercial/business
  relationships rather than technical developer integrations. This entry is a
  gated stub - the logical APIs below are honestly MODELED from Custom Ink's
  public product surface, not sourced from published API documentation, and no
  endpoints are fabricated as if real.
