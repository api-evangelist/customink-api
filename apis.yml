  description: >-
    A single, honestly MODELED logical surface representing what a Custom Ink
    developer API could cover - a Products catalog (garment styles, colors,
    sizes), a Design capability (Design Lab artwork placement and previews),
    Quotes (instant price by product, ink colors, and quantity), and Orders
    (submission and status tracking). This is NOT a documented public API.
    Custom Ink exposes no public or partner developer API for these functions as
    of the review date; endpointsModeled is true and no concrete endpoints are
    claimed. The internal api.customink.com host that powers Custom Ink's own
    apps is private, undocumented, and out of scope for third-party use.
